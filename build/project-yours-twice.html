<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yours Twice | Nadeem Noushad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@500;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" crossorigin href="/assets/style-B_9P30kV.css">
</head>

<body>
  <div class="noise"></div>

  <nav class="sticky-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-name">NADEEM NOUSHAD <span>Cinematographer</span></a>
      <div class="nav-right-group">
        <a href="index.html#contact" class="btn-talk">Contact</a>
        <a href="index.html#work" class="btn-back">← Work</a>
      </div>
    </div>
  </nav>

  <main class="project-detail-page">
    <section class="project-detail-hero">
      <video class="project-detail-video" controls playsinline preload="auto">
        <source src="/Yours.Twice.V1.mp4" type="video/mp4">
      </video>
    </section>

    <section class="project-detail-content">
      <div class="project-detail-container">
        <div class="project-detail-description">
          <h1 class="project-detail-title">Yours Twice</h1>
          <p class="project-detail-meta">Director of Photography</p>
          <p class="project-detail-text">
            A visual piece by Nadeem Noushad, focusing on lighting and composition.
          </p>
        </div>
        <div class="project-detail-frames">
          <div class="frames-label">Still Frames</div>
          <div class="frames-viewer">
            <div class="frames-viewer-slides frames-stack">
              <div class="frame active"><img src="/b1.jpeg" alt="Frame 1"></div>
              <div class="frame"><img src="/b2.jpeg" alt="Frame 2"></div>
              <div class="frame"><img src="/b3.jpeg" alt="Frame 3"></div>
              <div class="frame"><img src="/b4.jpeg" alt="Frame 4"></div>
            </div>
            <button type="button" class="frames-prev" aria-label="Previous frame">←</button>
            <button type="button" class="frames-next" aria-label="Next frame">→</button>
            <div class="frames-dots" role="tablist"></div>
          </div>
        </div>
      </div>
    </section>

    
  </main>
  <script src="/project-detail.js"></script>
